<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giovana Jafelice</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body>
  <div id="header-placeholder"></div>
  <main class="w-full h-[680px] flex flex-col justify-center items-center">
    <div class="bg-contato">
      <img src="/images/bg-contato.png" alt="Background">
      <section class="container">
        <h1 class="title-first text-[#668E7D]">Contato</h1>
        <p class="mb-6">Atendimento mediante agendamento prévio.</p>
        <div class="w-full flex gap-10 items-start">
          <div class="flex items-start gap-2">
            <img src="/images/map.svg" alt="" class="icon-footer">
            <ul class="list-none m-0 p-0">
              <li>Avenida Jurucê, 789</li>
              <li>Moema - São Paulo - SP</li>
              <li>CEP: 04080-010</li>
            </ul>
          </div>
          <div class="flex items-center gap-2">
            <img src="/images/phone.svg" alt="" class="icon-footer">
            <span>+55 (11) 99638-7920</span>
          </div>
          <div class="flex items-center gap-2">
            <img src="/images/doc.svg" alt="" class="icon-footer">
            <span>CRP 06/112830</span>
          </div>
        </div>
      </section>
    </div>

  </main>
  <div id="footer-placeholder"></div>
  <script src="/main.js"></script>
</body>

</html>
